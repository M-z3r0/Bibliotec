<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><!--Código para integrar o BootStrap-->
    <link rel="stylesheet" href="../../models/style/login.css">
    <title>Página de Login</title>
  </head>
  <body>
    <section class="container">
      <div class="form-container">
          <form action="../../models/functions/php/login.php" method="POST">
              <div class="log-options">
                  <label>
                      <input type="radio" name="log" value="adm"> ADMIN
                  </label>
                  <label>
                      <input type="radio" name="log" value="func"> Funcionário 
                  </label>
                  <label>
                      <input type="radio" name="log" value="aluno"> Aluno
                  </label>
              </div>

              <!-- Inputs -->
              <input type="text" name="biblio_cod" placeholder="Digite algo 1" required>
              <input type="text" name="user_cod" placeholder="Digite algo 2" required>
              <input type="text" name="user_password" placeholder="Digite algo 3" required>

              <!-- Submit Button -->
              <button type="submit">Logar</button>
          </form>
      </div>

      <div class="image-container">
          <!-- Colocar conteúdo ou imagem aqui -->
      </div>
  </body>
</html>
